<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>iM증권 업무 Q&A</title>
<style>
  :root {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --border: #e3e5ea;
    --text: #1c1e21;
    --text-muted: #6b7280;
    --accent: #2f6feb;
    --accent-soft: #eaf1fe;
    --user-bubble: #2f6feb;
    --user-bubble-text: #ffffff;
    --code-bg: #eef0f4;
    --shadow: 0 1px 3px rgba(16, 24, 40, 0.06), 0 1px 2px rgba(16, 24, 40, 0.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16181d;
      --surface: #1f2228;
      --border: #2c2f36;
      --text: #e7e9ec;
      --text-muted: #9aa0a8;
      --accent: #5b8def;
      --accent-soft: #223354;
      --user-bubble: #5b8def;
      --user-bubble-text: #0b1220;
      --code-bg: #262a31;
      --shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", -apple-system, "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  main {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px 140px;
    display: flex;
    justify-content: center;
  }
  .thread {
    width: 100%;
    max-width: 760px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .empty-state {
    margin: auto;
    text-align: center;
    color: var(--text-muted);
    font-size: 0.9rem;
    padding: 40px 20px;
  }
  .empty-state .icon { font-size: 2rem; margin-bottom: 8px; }
  .turn { display: flex; flex-direction: column; gap: 10px; }
  .bubble-row { display: flex; }
  .bubble-row.user { justify-content: flex-end; }
  .bubble {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 14px;
    line-height: 1.55;
    font-size: 0.93rem;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .bubble.user {
    background: var(--user-bubble);
    color: var(--user-bubble-text);
    border-bottom-right-radius: 4px;
  }
  .answer-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    border-top-left-radius: 4px;
    box-shadow: var(--shadow);
    padding: 14px 16px;
    max-width: 88%;
  }
  .answer-card.error { color: #c0392b; }
  .answer-text {
    font-size: 0.93rem;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .answer-text code {
    background: var(--code-bg);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 0.87em;
    font-family: "Cascadia Code", Consolas, monospace;
  }
  .sections {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tag {
    font-size: 0.74rem;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 3px 9px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .typing {
    display: flex;
    gap: 4px;
    padding: 6px 2px;
  }
  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }
  footer {
    position: sticky;
    bottom: 0;
    padding: 14px 16px 18px;
    background: linear-gradient(to top, var(--bg) 60%, transparent);
  }
  .composer {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 8px 8px 8px 16px;
  }
  textarea {
    flex: 1;
    border: none;
    outline: none;
    resize: none;
    background: transparent;
    color: var(--text);
    font-size: 0.95rem;
    font-family: inherit;
    line-height: 1.5;
    max-height: 140px;
    padding: 8px 0;
  }
  textarea::placeholder { color: var(--text-muted); }
  button#ask-btn {
    border: none;
    background: var(--accent);
    color: #fff;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    transition: opacity 0.15s;
  }
  button#ask-btn:disabled { opacity: 0.4; cursor: default; }
  button#ask-btn:not(:disabled):hover { opacity: 0.85; }
</style>
</head>
<body>
  <main>
    <div class="thread" id="thread">
      <div class="empty-state" id="empty-state">
        <div class="icon">📄</div>
        예: "상품채권 잔고는 어디서 확인해?", "매도대행 업무 절차는?", "회의실 예약 화면번호는?"
      </div>
    </div>
  </main>

  <footer>
    <div class="composer">
      <textarea id="question" rows="1" placeholder="질문을 입력하세요..."></textarea>
      <button id="ask-btn" aria-label="질문하기">➤</button>
    </div>
  </footer>

<script>
const askBtn = document.getElementById('ask-btn');
const questionEl = document.getElementById('question');
const threadEl = document.getElementById('thread');
const emptyStateEl = document.getElementById('empty-state');

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  }[c]));
}

// 백틱으로 감싼 테이블명/컬럼명 등을 <code>로 렌더링
function renderAnswer(text) {
  const escaped = escapeHtml(text);
  return escaped.replace(/`([^`]+)`/g, '<code>$1</code>');
}

function autoResize() {
  questionEl.style.height = 'auto';
  questionEl.style.height = Math.min(questionEl.scrollHeight, 140) + 'px';
}
questionEl.addEventListener('input', autoResize);

function addUserBubble(text) {
  const row = document.createElement('div');
  row.className = 'bubble-row user';
  row.innerHTML = `<div class="bubble user"></div>`;
  row.querySelector('.bubble').textContent = text;
  threadEl.appendChild(row);
  return row;
}

function addTypingIndicator() {
  const row = document.createElement('div');
  row.className = 'bubble-row';
  row.innerHTML = `<div class="answer-card"><div class="typing"><span></span><span></span><span></span></div></div>`;
  threadEl.appendChild(row);
  return row;
}

function renderAnswerCard(row, data, isError) {
  const card = document.createElement('div');
  card.className = 'answer-card' + (isError ? ' error' : '');
  const textDiv = document.createElement('div');
  textDiv.className = 'answer-text';
  textDiv.innerHTML = isError ? escapeHtml(data) : renderAnswer(data.answer);
  card.appendChild(textDiv);

  if (!isError && data.sections && data.sections.length) {
    const tagsDiv = document.createElement('div');
    tagsDiv.className = 'sections';
    data.sections.forEach((s) => {
      const tag = document.createElement('span');
      tag.className = 'tag';
      tag.textContent = s;
      tagsDiv.appendChild(tag);
    });
    card.appendChild(tagsDiv);
  }

  row.innerHTML = '';
  row.className = 'bubble-row';
  row.appendChild(card);
}

async function ask() {
  const question = questionEl.value.trim();
  if (!question) return;

  emptyStateEl.style.display = 'none';
  addUserBubble(question);
  const pendingRow = addTypingIndicator();
  threadEl.scrollIntoView({ block: 'end' });
  window.scrollTo(0, document.body.scrollHeight);

  questionEl.value = '';
  autoResize();
  askBtn.disabled = true;

  try {
    const res = await fetch('/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question }),
    });
    const data = await res.json();
    if (!res.ok) {
      renderAnswerCard(pendingRow, data.error || '오류가 발생했습니다.', true);
    } else {
      renderAnswerCard(pendingRow, data, false);
    }
  } catch (e) {
    renderAnswerCard(pendingRow, '요청 중 오류가 발생했습니다.', true);
  } finally {
    askBtn.disabled = false;
    document.querySelector('main').scrollTop = document.querySelector('main').scrollHeight;
  }
}

askBtn.addEventListener('click', ask);
questionEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    ask();
  }
});
</script>
</body>
</html>
